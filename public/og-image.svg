<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 630" role="img" aria-label="Monster truck">
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0" stop-color="#111820" />
      <stop offset="1" stop-color="#202a33" />
    </linearGradient>
    <linearGradient id="body" x1="0" x2="1">
      <stop offset="0" stop-color="#ff4d4d" />
      <stop offset="1" stop-color="#ffb703" />
    </linearGradient>
    <linearGradient id="bodyDark" x1="0" x2="1">
      <stop offset="0" stop-color="#1e2329" />
      <stop offset="1" stop-color="#3a3f45" />
    </linearGradient>
    <linearGradient id="metal" x1="0" x2="1">
      <stop offset="0" stop-color="#cfd6dd" />
      <stop offset="1" stop-color="#7a838c" />
    </linearGradient>
    <radialGradient id="tire" cx="35%" cy="35%" r="70%">
      <stop offset="0" stop-color="#3c4147" />
      <stop offset="0.55" stop-color="#1a1d21" />
      <stop offset="1" stop-color="#090b0d" />
    </radialGradient>
    <radialGradient id="rim" cx="40%" cy="40%" r="70%">
      <stop offset="0" stop-color="#f4f7fb" />
      <stop offset="0.6" stop-color="#9aa3ad" />
      <stop offset="1" stop-color="#3f4750" />
    </radialGradient>
  </defs>

  <rect width="900" height="630" rx="80" fill="url(#bg)" />
  <rect x="0" y="440" width="900" height="190" fill="#202a24" />
  <rect x="0" y="470" width="900" height="160" fill="#5a3b24" opacity="0.45" />

  <ellipse cx="260" cy="500" rx="130" ry="44" fill="rgba(0,0,0,0.45)" />
  <ellipse cx="640" cy="500" rx="130" ry="44" fill="rgba(0,0,0,0.45)" />

  <rect x="140" y="330" width="520" height="130" rx="50" fill="url(#body)" stroke="#1c1c1c" stroke-width="12" />
  <rect x="390" y="240" width="190" height="90" rx="28" fill="url(#body)" stroke="#1c1c1c" stroke-width="12" />
  <rect x="420" y="260" width="90" height="40" rx="12" fill="#7ec8ff" stroke="#23313a" stroke-width="8" />

  <rect x="220" y="300" width="240" height="40" rx="20" fill="url(#bodyDark)" />
  <rect x="230" y="360" width="90" height="55" rx="18" fill="#ff9f1c" opacity="0.85" />
  <rect x="330" y="360" width="90" height="55" rx="18" fill="#ff9f1c" opacity="0.85" />

  <path d="M160 330 L220 280 L360 280" stroke="#2b2b2b" stroke-width="16" fill="none" />
  <path d="M560 280 L660 330 L720 360" stroke="#2b2b2b" stroke-width="16" fill="none" />

  <rect x="170" y="240" width="28" height="90" rx="8" fill="#2b2b2b" />
  <rect x="200" y="240" width="18" height="40" rx="6" fill="#3a3f45" />
  <rect x="640" y="250" width="28" height="90" rx="8" fill="#2b2b2b" />
  <rect x="670" y="250" width="18" height="40" rx="6" fill="#3a3f45" />

  <rect x="170" y="470" width="470" height="26" rx="13" fill="url(#metal)" />
  <rect x="650" y="360" width="70" height="24" rx="12" fill="url(#metal)" />
  <circle cx="710" cy="330" r="14" fill="#ffd166" stroke="#8a5a0a" stroke-width="8" />

  <path d="M210 470 C260 440, 320 470, 380 440" stroke="#ff9f1c" stroke-width="12" fill="none" />
  <path d="M210 490 C260 460, 320 490, 380 460" stroke="#ffd166" stroke-width="10" fill="none" />

  <g>
    <circle cx="260" cy="500" r="102" fill="url(#tire)" stroke="#0f1115" stroke-width="24" />
    <circle cx="640" cy="500" r="102" fill="url(#tire)" stroke="#0f1115" stroke-width="24" />
    <circle cx="260" cy="500" r="42" fill="url(#rim)" />
    <circle cx="640" cy="500" r="42" fill="url(#rim)" />
    <circle cx="260" cy="500" r="14" fill="#e7edf5" />
    <circle cx="640" cy="500" r="14" fill="#e7edf5" />
  </g>

  <rect x="230" y="520" width="40" height="70" rx="10" fill="#1c1c1c" />
  <rect x="680" y="520" width="40" height="70" rx="10" fill="#1c1c1c" />
